swagger: "2.0"
info:
  title: Petstore
  version: 1.0.0
host: api.example.com
basePath: /v1
schemes: [https]
consumes: [application/json]
produces: [application/json]
paths:
  /pets:
    get:
      summary: List pets
      responses:
        '200':
          description: A list of pets
          schema:
            type: array
            items:
              $ref: '#/definitions/Pet'
        '500':
          description: Server error
          schema:
            $ref: '#/definitions/Error'
    post:
      summary: Create a pet
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Pet'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Pet'
        '400':
          description: Bad request
          schema:
            $ref: '#/definitions/Error'
  /pets/{petId}:
    get:
      summary: Get a pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
      responses:
        '200':
          description: A pet
          schema:
            $ref: '#/definitions/Pet'
        '404':
          description: Not found
          schema:
            $ref: '#/definitions/Error'
securityDefinitions:
  api_key:
    type: apiKey
    name: X-API-Key
    in: header
definitions:
  Pet:
    type: object
    required: [id, name]
    properties:
      id:
        type: integer
        example: 7
      name:
        type: string
        example: Rex
      tag:
        type: string
        enum: [dog, cat, bird]
  Error:
    type: object
    properties:
      code:
        type: integer
        example: 500
      message:
        type: string
        example: Something went wrong
